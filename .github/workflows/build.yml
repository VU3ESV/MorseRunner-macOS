name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write        # needed to attach assets to a release on tag

jobs:
  build-macos:
    runs-on: macos-14    # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - name: Install Free Pascal + PortAudio
        run: brew install fpc portaudio

      - name: Cache Lazarus lazbuild
        id: cache-laz
        uses: actions/cache@v4
        with:
          path: ~/lazarus-src
          key: lazarus-3_6-lazbuild-${{ runner.os }}-${{ runner.arch }}

      - name: Build lazbuild (LCL) from source
        if: steps.cache-laz.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b lazarus_3_6 \
            https://gitlab.com/freepascal.org/lazarus/lazarus.git "$HOME/lazarus-src"
          make -C "$HOME/lazarus-src" lazbuild PP="$(which fpc)"

      - name: Build + package MorseRunner.app
        run: LAZARUS_DIR="$HOME/lazarus-src" ./package.sh

      - name: Smoke test (launch headless, confirm no startup crash)
        run: |
          ./MorseRunner &
          PID=$!
          sleep 5
          if kill -0 "$PID" 2>/dev/null; then echo "launch OK"; kill "$PID"; else echo "startup crashed"; exit 1; fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MorseRunner-macos-arm64
          path: |
            dist/*.dmg
            dist/*.zip

      - name: Attach to GitHub release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # release is normally created from the local build; attach/clobber the
          # CI-built artifacts. Create it if it doesn't exist yet.
          gh release upload "${GITHUB_REF_NAME}" dist/*.dmg dist/*.zip --clobber \
            || gh release create "${GITHUB_REF_NAME}" dist/*.dmg dist/*.zip \
                 --title "MorseRunner ${GITHUB_REF_NAME}" --generate-notes
